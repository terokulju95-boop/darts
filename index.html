<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 DartsApp</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#00e87a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Darts">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --bg: #08080f;
  --surface: #0f0f1a;
  --card: #161622;
  --card2: #1c1c2c;
  --border: #252538;
  --accent: #00e87a;
  --accent2: #00b05c;
  --red: #ff3355;
  --gold: #ffd700;
  --blue: #4488ff;
  --text: #e8e8f0;
  --muted: #6060a0;
  --fd: 'Bebas Neue', sans-serif;
  --fu: 'Barlow Condensed', sans-serif;
  --fb: 'Barlow', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--fu); overflow:hidden; }
#app { height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
.screen { flex:1; display:flex; flex-direction:column; overflow-y:auto; overflow-x:hidden; }

.header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:12px 16px; display:flex; align-items:center; gap:12px;
  flex-shrink:0; position:sticky; top:0; z-index:10;
}
.header-title { font-family:var(--fd); font-size:26px; letter-spacing:1px; color:var(--accent); flex:1; }
.back-btn {
  background:var(--card); border:1px solid var(--border); color:var(--text);
  padding:8px 14px; border-radius:8px; font-family:var(--fu); font-size:14px; font-weight:600; cursor:pointer;
}
.back-btn:active { opacity:0.7; }

/* HOME */
.home-logo { text-align:center; padding:36px 20px 16px; }
.home-logo .dart { font-size:60px; display:block; margin-bottom:6px; }
.home-logo h1 { font-family:var(--fd); font-size:56px; letter-spacing:6px; color:var(--accent); text-shadow:0 0 40px rgba(0,232,122,0.35); }
.home-logo p { color:var(--muted); font-size:12px; letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
.home-menu { padding:16px; display:flex; flex-direction:column; gap:10px; }
.menu-btn {
  background:var(--card); border:1px solid var(--border); color:var(--text);
  padding:20px 20px; border-radius:12px; font-family:var(--fu); font-size:20px; font-weight:600; letter-spacing:1px;
  cursor:pointer; text-align:left; display:flex; align-items:center; gap:12px; transition:all 0.12s;
}
.menu-btn:active { transform:scale(0.97); }
.menu-btn.primary {
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  border-color:var(--accent); color:#000; font-size:20px; padding:22px 20px;
}
.menu-btn .icon { font-size:22px; }
.menu-btn .label { flex:1; }
.menu-btn .arrow { color:var(--muted); font-size:18px; }
.menu-btn.primary .arrow { color:rgba(0,0,0,0.4); }

/* GAME TYPE LIST */
.game-list { padding:14px; display:flex; flex-direction:column; gap:9px; }
.game-card {
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  padding:14px 16px; cursor:pointer; transition:all 0.12s; display:flex; align-items:center; gap:14px;
}
.game-card:active { transform:scale(0.97); background:var(--card2); }
.game-card.featured { border-color:rgba(0,232,122,0.4); }
.game-icon { font-size:26px; }
.game-info { flex:1; }
.game-name { font-family:var(--fd); font-size:26px; letter-spacing:1px; }
.game-desc { font-size:14px; color:var(--muted); margin-top:2px; }
.badge { background:var(--accent); color:#000; font-size:10px; font-weight:700; padding:3px 7px; border-radius:20px; }

/* CONFIG */
.config-section { padding:14px 16px; border-bottom:1px solid var(--border); }
.config-label { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.option-row { display:flex; gap:8px; flex-wrap:wrap; }
.option-btn {
  background:var(--card); border:1px solid var(--border); color:var(--text);
  padding:12px 16px; border-radius:8px; font-family:var(--fu); font-size:16px; font-weight:600; cursor:pointer;
}
.option-btn.selected { background:var(--accent); border-color:var(--accent); color:#000; }

/* PLAYERS */
.players-list { padding:14px; display:flex; flex-direction:column; gap:9px; }
.player-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 15px; display:flex; align-items:center; gap:12px; }
.player-avatar { width:40px; height:40px; border-radius:50%; background:var(--accent2); display:flex; align-items:center; justify-content:center; font-family:var(--fd); font-size:18px; color:#000; flex-shrink:0; }
.player-name { flex:1; font-size:20px; font-weight:600; }
.player-stat { font-size:13px; color:var(--muted); }
.player-del { background:none; border:1px solid var(--red); color:var(--red); padding:6px 10px; border-radius:7px; font-size:12px; cursor:pointer; }
.add-player-form { padding:14px; display:flex; gap:10px; }
.text-input {
  flex:1; background:var(--card); border:1px solid var(--border); color:var(--text);
  padding:12px 16px; border-radius:10px; font-family:var(--fu); font-size:16px; outline:none;
}
.text-input:focus { border-color:var(--accent); }

/* PLAYER SELECT */
.player-select-list { padding:14px; display:flex; flex-direction:column; gap:9px; }
.player-select-card {
  background:var(--card); border:2px solid var(--border); border-radius:12px;
  padding:13px 15px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.12s;
}
.player-select-card.selected { border-color:var(--accent); background:rgba(0,232,122,0.07); }
.checkmark { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; }
.player-select-card.selected .checkmark { background:var(--accent); border-color:var(--accent); color:#000; }

/* BUTTONS */
.btn {
  background:var(--accent); border:none; color:#000; padding:12px 18px;
  border-radius:10px; font-family:var(--fu); font-size:14px; font-weight:700; cursor:pointer; transition:all 0.12s;
}
.btn:active { transform:scale(0.95); }
.btn.secondary { background:var(--card); border:1px solid var(--border); color:var(--text); }
.btn.large { padding:16px 24px; font-size:16px; width:100%; }
.btn.disabled { opacity:0.35; pointer-events:none; }
.btn.danger { background:var(--red); color:#fff; }

/* NUMBER SPINNER */
.number-input-row { display:flex; align-items:center; gap:12px; padding:6px 0; }
.number-spinner { background:var(--card); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:8px; font-family:var(--fd); font-size:28px; width:110px; text-align:center; outline:none; }
.spinner-btn { background:var(--card2); border:1px solid var(--border); color:var(--text); width:42px; height:42px; border-radius:8px; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

/* GAME SCREEN - X01 */
.game-header { background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.player-tabs { display:flex; overflow-x:auto; scrollbar-width:none; padding:0; gap:2px; }
.player-tabs::-webkit-scrollbar { display:none; }
.player-tab { flex-shrink:0; padding:10px 12px; font-family:var(--fu); font-size:13px; font-weight:600; color:var(--muted); border-bottom:2px solid transparent; white-space:nowrap; }
.player-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

.score-board { padding:12px 16px; text-align:center; flex-shrink:0; }
.cur-player-name { font-size:12px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:2px; }
.cur-score { font-family:var(--fd); font-size:96px; line-height:1; color:var(--text); letter-spacing:-2px; transition:color 0.2s; }
.cur-score.bust { color:var(--red); }
.cur-score.win { color:var(--accent); }
.score-sub { font-size:14px; color:var(--muted); margin-top:3px; min-height:20px; }

.darts-thrown { display:flex; justify-content:center; gap:7px; padding:6px 16px; flex-shrink:0; }
.dart-chip { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 13px; font-family:var(--fd); font-size:22px; color:var(--text); min-width:60px; text-align:center; }
.dart-chip.empty { color:var(--muted); border-style:dashed; }
.dart-chip.miss { color:var(--muted); }
.dart-chip.triple { color:var(--accent); border-color:rgba(0,232,122,0.4); }
.dart-chip.double { color:var(--blue); border-color:rgba(68,136,255,0.4); }
.dart-chip.bull { color:var(--gold); border-color:rgba(255,215,0,0.4); }

.input-area { flex:1; display:flex; flex-direction:column; padding:8px; gap:7px; overflow:hidden; min-height:0; }
.modifier-row { display:flex; gap:7px; flex-shrink:0; }
.mod-btn {
  flex:1; background:var(--card); border:2px solid var(--border); color:var(--text);
  padding:13px 6px; border-radius:10px; font-family:var(--fd); font-size:20px; letter-spacing:1px;
  cursor:pointer; transition:all 0.12s; line-height:1;
}
.mod-btn:active { transform:scale(0.93); }
.mod-btn.active-T { background:rgba(0,232,122,0.12); border-color:var(--accent); color:var(--accent); }
.mod-btn.active-D { background:rgba(68,136,255,0.12); border-color:var(--blue); color:var(--blue); }
.mod-btn.miss-btn { background:rgba(255,51,85,0.08); border-color:rgba(255,51,85,0.4); color:var(--red); }
.mod-btn.undo-btn { color:var(--muted); }

.number-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; flex:1; min-height:0; }
.num-btn {
  background:var(--card2); border:1px solid var(--border); color:var(--text);
  border-radius:10px; font-family:var(--fd); font-size:26px; cursor:pointer;
  transition:all 0.08s; display:flex; align-items:center; justify-content:center; line-height:1;
}
.num-btn:active { transform:scale(0.88); background:var(--card); }
.num-btn.bull-btn { grid-column:span 2; background:rgba(255,215,0,0.07); border-color:rgba(255,215,0,0.25); color:var(--gold); font-size:16px; }
.num-btn.next-btn { grid-column:span 3; background:var(--accent); border-color:var(--accent); color:#000; font-size:15px; font-family:var(--fu); font-weight:700; letter-spacing:1px; }

/* CRICKET */
.cricket-marks-cell { text-align:center; font-size:20px; line-height:1.2; }
.cricket-pts-cell { font-family:var(--fd); font-size:18px; text-align:center; color:var(--accent); }
.cricket-num-grid { display:flex; gap:7px; justify-content:center; flex-wrap:wrap; padding:6px 0; }
.cricket-num-btn {
  background:var(--card2); border:1px solid var(--border); color:var(--text);
  width:50px; height:50px; border-radius:10px; font-family:var(--fd); font-size:22px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.cricket-num-btn.bull { background:rgba(255,215,0,0.08); border-color:rgba(255,215,0,0.3); color:var(--gold); font-size:14px; }
.cricket-num-btn:active { transform:scale(0.88); }

/* GAME OVER */
.gameover-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 20px; text-align:center; }
.trophy { font-size:80px; margin-bottom:14px; animation:bounce 0.6s ease; }
@keyframes bounce { 0%{transform:scale(0)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
.winner-label { font-size:13px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
.winner-name { font-family:var(--fd); font-size:56px; color:var(--gold); letter-spacing:2px; text-shadow:0 0 30px rgba(255,215,0,0.45); }

/* HISTORY */
.history-list { padding:14px; display:flex; flex-direction:column; gap:9px; }
.history-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 15px; }
.history-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.h-type { font-family:var(--fd); font-size:24px; color:var(--accent); }
.h-date { font-size:13px; color:var(--muted); }
.h-winner { font-size:15px; color:var(--gold); }
.h-players { font-size:14px; color:var(--muted); margin-top:3px; }

/* STATS */
.stats-grid { padding:14px; display:flex; flex-direction:column; gap:11px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; }
.stat-name { font-family:var(--fd); font-size:26px; margin-bottom:11px; }
.stat-row { display:flex; justify-content:space-between; font-size:16px; padding:7px 0; border-bottom:1px solid var(--border); }
.stat-row:last-child { border:none; }
.stat-val { color:var(--accent); font-weight:600; }

/* SETTINGS */
.settings-section { padding:16px; }
.settings-desc { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:16px; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; }

/* TOAST */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--border); color:var(--text); padding:11px 20px; border-radius:10px; font-size:14px; font-weight:600; z-index:1000; opacity:0; transition:opacity 0.25s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
.toast.success { border-color:var(--accent); color:var(--accent); }
.toast.error { border-color:var(--red); color:var(--red); }

/* BUST OVERLAY */
.bust-overlay { position:fixed; inset:0; background:rgba(255,51,85,0.18); display:flex; align-items:center; justify-content:center; z-index:500; pointer-events:none; opacity:0; transition:opacity 0.25s; }
.bust-text { font-family:var(--fd); font-size:90px; color:var(--red); text-shadow:0 0 50px rgba(255,51,85,0.9); letter-spacing:4px; }

/* EMPTY / LOADER */
.empty-state { padding:48px 32px; text-align:center; color:var(--muted); }
.empty-state .ei { font-size:48px; display:block; margin-bottom:12px; }
.empty-state p { font-size:14px; line-height:1.5; }
.loader { display:flex; align-items:center; justify-content:center; padding:40px; color:var(--muted); font-size:14px; }

/* ORDER HINT */
.order-hint { font-size:12px; color:var(--muted); padding:6px 16px; text-align:center; }

/* SCORE DROP */
@keyframes scoreDrop {
  0%   { transform:translateY(-24px) scale(1.15); opacity:0; color:var(--accent); }
  65%  { transform:translateY(3px) scale(1.03); opacity:1; }
  100% { transform:translateY(0) scale(1); opacity:1; }
}
.score-drop { animation:scoreDrop 0.36s cubic-bezier(.22,1,.36,1) both; }
@keyframes pulse-glow {
  0%,100% { box-shadow:0 0 0 0 rgba(0,232,122,0.45); }
  50%      { box-shadow:0 0 0 7px rgba(0,232,122,0); }
}
.tab-active-pulse { animation:pulse-glow 2s ease infinite; }
.confetti-piece { position:fixed; top:-14px; border-radius:2px; z-index:9999; pointer-events:none; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1;} 85%{opacity:1;} 100%{transform:translateY(110vh) rotate(700deg);opacity:0;} }
.bar-container { margin-top:8px; }
.bar-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.bar-label { font-size:13px; color:var(--muted); min-width:64px; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bar-track { flex:1; background:var(--card2); border-radius:20px; height:24px; overflow:hidden; }
.bar-fill { height:100%; border-radius:20px; display:flex; align-items:center; padding-left:8px; font-family:var(--fd); font-size:14px; color:#000; transition:width 0.8s cubic-bezier(.22,1,.36,1); }
.gstat-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin:0 16px 10px; }
.gstat-title { font-family:var(--fd); font-size:16px; color:var(--accent); letter-spacing:1px; margin-bottom:8px; }
.gstat-row { display:flex; justify-content:space-between; font-size:14px; padding:5px 0; border-bottom:1px solid var(--border); }
.gstat-row:last-child { border:none; }
.gstat-val { color:var(--text); font-weight:600; }
.atc-progress { display:flex; flex-wrap:wrap; gap:4px; padding:6px 12px; }
.atc-badge { font-family:var(--fd); font-size:13px; padding:3px 8px; border-radius:20px; }
.atc-done { background:rgba(0,232,122,0.15); color:var(--accent); border:1px solid rgba(0,232,122,0.3); }
.atc-cur  { background:var(--accent); color:#000; }
.atc-todo { background:var(--card2); color:var(--muted); border:1px solid var(--border); }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<div id="bust-overlay" class="bust-overlay"><div class="bust-text">BUST!</div></div>

<script>
// ==================== FIREBASE ====================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDswdEF9J0gsHJH6Zo_8BGZrf8DVG3FwYc",
  authDomain: "hakemuspaivakirja.firebaseapp.com",
  projectId: "hakemuspaivakirja",
  storageBucket: "hakemuspaivakirja.firebasestorage.app",
  messagingSenderId: "836133210317",
  appId: "1:836133210317:web:d85131ae272ecf1938c184"
};

let db = null;
function initFirebase() {
  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FIREBASE_CONFIG);
    }
    db = firebase.firestore();
    return true;
  } catch(e) { console.error('FB init:', e); return false; }
}

async function fbSaveGame(data) {
  if (!db) { showToast('Firebase ei konfiguroitu', 'error'); return; }
  try {
    await db.collection('darts_games').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    showToast('Peli tallennettu ✓', 'success');
  } catch(e) { showToast('Tallennus epäonnistui', 'error'); console.error(e); }
}

async function fbLoadHistory() {
  if (!db) return [];
  try {
    const snap = await db.collection('darts_games').orderBy('createdAt','desc').limit(60).get();
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error(e); return []; }
}

async function deleteGame(id) {
  if (!confirm('Poistetaanko peli?')) return;
  if (!db) return;
  try {
    await db.collection('darts_games').doc(id).delete();
    S.history = S.history.filter(g => g.id !== id);
    render();
    showToast('Peli poistettu', 'success');
  } catch(e) { showToast('Poisto epäonnistui','error'); }
}

async function deleteAllGames() {
  if (!confirm('Poistetaanko KAIKKI pelit? Tätä ei voi peruuttaa.')) return;
  if (!db) return;
  try {
    const snap = await db.collection('darts_games').get();
    const batch = db.batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    S.history = [];
    render();
    showToast('Kaikki pelit poistettu', 'success');
  } catch(e) { showToast('Poisto epäonnistui','error'); }
}

// ==================== STATE ====================
let S = {
  screen: 'home',
  players: [],
  playersLoaded: false,
  setup: { gameType: null, config: {}, selected: [] },
  game: null,
  history: [],
  historyLoaded: false,
  stats: {},
  statsLoaded: false,
};

// Players stored in Firebase (not localStorage) so they persist across browser data clears
async function loadPlayers() {
  if (!db) return;
  try {
    const snap = await db.collection('darts_players').orderBy('name').get();
    S.players = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    S.playersLoaded = true;
  } catch(e) { console.error('loadPlayers:', e); S.players = []; }
}

async function savePlayers() {
  // No-op: players are saved individually via addPlayer/delPlayer
}

async function fbAddPlayer(p) {
  if (!db) return p;
  try {
    const ref = await db.collection('darts_players').add({ name: p.name, wins: 0, games: 0, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    return { ...p, id: ref.id };
  } catch(e) { console.error(e); return p; }
}

async function fbDeletePlayer(id) {
  if (!db) return;
  try { await db.collection('darts_players').doc(id).delete(); } catch(e) { console.error(e); }
}

async function fbUpdatePlayerStats(id, wins, games) {
  if (!db) return;
  try { await db.collection('darts_players').doc(id).update({ wins, games }); } catch(e) { console.error(e); }
}

function genId() { return Math.random().toString(36).slice(2,10); }

// ==================== GAME DEFINITIONS ====================
const GAMES = [
  { id:'501',        name:'501',              icon:'🎯', desc:'Suosituin kilpailupeli. Lopeta tuplaan.', hot:true },

const HALVEIT_TARGETS = [20,16,'D7',14,'T10','D-BULL',17,13,'T3'];

// ==================== UTILS ====================
function dartValue(dart) {
  if (!dart || dart === 'MISS') return 0;
  if (dart === 'BULL') return 50;
  if (dart === '25') return 25;
  if (dart === 'T25') return 75; // won't happen but safe
  const m = dart.match(/^([TDB]?)(\d+)$/);
  if (!m) return 0;
  const [,mod,num] = m;
  const n = parseInt(num);
  if (n > 20 && n !== 25) return 0;
  if (mod === 'T') return n * 3;
  if (mod === 'D') return n * 2;
  return n;
}

function dartClass(d) {
  if (!d || d === 'MISS') return 'miss';
  if (d.startsWith('T')) return 'triple';
  if (d.startsWith('D') || d === 'BULL') return d === 'BULL' ? 'bull' : 'double';
  return '';
}

function marksSymbol(n) {
  if (n <= 0) return '';
  if (n === 1) return '/';
  if (n === 2) return 'X';
  return '●';
}

function validCheckout(dart, mode, remaining) {
  const v = dartValue(dart);
  if (v !== remaining) return false;
  if (mode === 'any') return true;
  if (mode === 'single') return !dart.startsWith('T') && !dart.startsWith('D') && dart !== 'BULL';
  if (mode === 'double') return dart.startsWith('D') || dart === 'BULL';
  if (mode === 'master') return dart.startsWith('D') || dart.startsWith('T') || dart === 'BULL';
  return false;
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(t._t); t._t = setTimeout(() => t.className='toast', 2200);
}

function showBust(cb) {
  const o = document.getElementById('bust-overlay');
  o.style.opacity = '1';
  setTimeout(() => { o.style.opacity = '0'; cb && cb(); }, 1100);
}

function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('fi-FI') + ' ' + d.toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});
}

function fmtDuration(sec) {
  if (!sec) return '';
  const m = Math.floor(sec/60), s = sec%60;
  return m + 'min ' + s + 's';
}

// ==================== NAV + RENDER ====================
function nav(screen, extra={}) {
  S.screen = screen;
  Object.assign(S, extra);
  render();
}

function render() {
  const app = document.getElementById('app');
  const fns = {
    home: renderHome, players: renderPlayers,
    'setup-type': renderSetupType, 'setup-config': renderSetupConfig,
    'setup-players': renderSetupPlayers,
    game: renderGame, gameover: renderGameOver,
    history: renderHistory, stats: renderStats, settings: renderSettings,
  };
  const fn = fns[S.screen];
  if (fn) { app.innerHTML = ''; app.appendChild(fn()); }
}

function renderPlayers() {
  const div = el('div','screen');
  const cards = S.players.length ? S.players.map(p => `

    </div>
  `).join('') : `<div class="empty-state"><span class="ei">👤</span><p>Ei pelaajia vielä.<br>Lisää uusi alta.</p></div>`;

  div.innerHTML = `

async function addPlayer() {
  const input = document.getElementById('np');
  const name = input.value.trim();
  if (!name) return;
  if (S.players.find(p => p.name.toLowerCase() === name.toLowerCase())) { showToast('Pelaaja on jo listassa','error'); return; }
  let p = { id:genId(), name, wins:0, games:0 };
  p = await fbAddPlayer(p);
  S.players.push(p);
  nav('players');
}

async function delPlayer(id) {
  if (!confirm('Poistetaanko pelaaja?')) return;
  await fbDeletePlayer(id);
  S.players = S.players.filter(p => p.id !== id);
  nav('players');
}

// ==================== START GAME ====================
function startGame() {
  const { gameType, config, selected } = S.setup;
  const players = selected.map(id => S.players.find(p => p.id===id)).filter(Boolean);
  const base = { type:gameType, gameOver:false, winner:null, startTime:Date.now(), currentPlayerIndex:0, currentDarts:[], modifier:null };

  const isX01 = ['501','301','701','custom_x01'].includes(gameType);
  if (isX01) {
    const start = config.startScore;
    S.game = { ...base,
      startScore:start, checkoutMode:config.checkoutMode||'double',
      players: players.map(p => ({ id:p.id, name:p.name, score:start, history:[] })),
      turnStartScore: start,
    };
  } else if (gameType === 'cricket') {
    const blankMarks = () => { const m={}; CRICKET_NUMS.forEach(n=>m[n]=0); return m; };
    S.game = { ...base,
      cricketMode: config.cricketMode||'american',
      players: players.map(p => ({ id:p.id, name:p.name, marks:blankMarks(), points:0, cPts:{}, history:[] })),
    };
  } else if (gameType === 'atc') {
    S.game = { ...base, players: players.map(p => ({ id:p.id, name:p.name, target:1, history:[], dc:{} })) };
  } else if (gameType === 'shanghai') {
    S.game = { ...base, round:1, maxRounds:7, players: players.map(p => ({ id:p.id, name:p.name, score:0, history:[] })) };
  } else if (gameType === 'halveit') {
    S.game = { ...base, roundIndex:0, targets:HALVEIT_TARGETS, players: players.map(p => ({ id:p.id, name:p.name, score:0, turnPts:0, history:[] })) };
  }
  localStorage.setItem('darts_game', JSON.stringify(S.game));
  nav('game');
}

// ==================== RENDER GAME ====================
function renderGame() {
  const g = S.game;
  if (!g) return renderHome();
  // Persist game state so it survives page refresh/app switch
  try { localStorage.setItem('darts_game', JSON.stringify(g)); } catch(e) {}
  if (g.type === 'cricket') return renderCricket();
  if (g.type === 'atc') return renderATC();
  return renderX01();
}

// ==================== X01 GAME ====================
function renderX01() {
  const g = S.game;
  const p = g.players[g.currentPlayerIndex];
  const darts = g.currentDarts;
  const div = el('div','screen'); div.style.cssText='display:flex;flex-direction:column;height:100%;overflow:hidden;';

  const gName = GAMES.find(x=>x.id===g.type)?.name || g.type.toUpperCase();
  const coName = g.checkoutMode==='double'?'Double Out':g.checkoutMode==='single'?'Single Out':g.checkoutMode==='master'?'Master Out':'Vapaa';

  const tabs = g.players.map((pl,i) => {
    const isActive = i === g.currentPlayerIndex;
    return `<div class="player-tab ${isActive?'active':''} ${isActive?'tab-active-pulse':''}" style="
      flex:1; text-align:center; padding:10px 8px;
      background:${isActive?'rgba(0,232,122,0.12)':'rgba(255,255,255,0.03)'};
      border-bottom:3px solid ${isActive?'var(--accent)':'rgba(255,255,255,0.1)'};
      min-width:80px; transition:all 0.15s;">
      <div style="font-family:var(--fd);font-size:${isActive?'18':'15'}px;color:${isActive?'var(--accent)':'#9090c0'};letter-spacing:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(pl.name).toUpperCase()}</div>
      <div style="font-family:var(--fd);font-size:${isActive?'32':'26'}px;color:${isActive?'#ffffff':'#7070a0'};line-height:1.1;">${pl.score}</div>
    </div>`;
  }).join('');

  const chips = [0,1,2].map(i => {
    const d = darts[i];
    return `<div class="dart-chip ${d?dartClass(d):'empty'}">${d||'—'}</div>`;
  }).join('');

  const modT = g.modifier==='T', modD = g.modifier==='D';
  let nums = '';
  for(let n=1;n<=20;n++) nums+=`<button class="num-btn" onclick="x01Dart(${n})">${n}</button>`;
  nums += `<button class="num-btn bull-btn" onclick="x01Bull()">BULL<br><small style="font-family:var(--fu);font-size:10px;font-weight:400;">${modD?'50':'25/50'}</small></button>`;
  nums += `<button class="num-btn next-btn" onclick="x01Next()">SEURAAVA ›</button>`;

  const subLabel = g.modifier
    ? `<span style="color:${modT?'var(--accent)':'var(--blue)'}">[ ${g.modifier} aktiivinen ]</span>`
    : 'pistettä jäljellä';

  const dartsLeft = 3 - g.currentDarts.length;
  const co = getCheckout(p.score, g.checkoutMode, dartsLeft);
  const coHtml = co
    ? `<div style="background:rgba(0,232,122,0.1);border:1px solid rgba(0,232,122,0.3);border-radius:10px;padding:7px 14px;margin:0 16px 2px;text-align:center;flex-shrink:0;">
        <span style="font-size:10px;color:var(--accent);letter-spacing:2px;">💡 CHECKOUT</span><br>
        <span style="font-family:var(--fd);font-size:22px;letter-spacing:2px;">${co.join(' → ')}</span>
       </div>` : '';

  div.innerHTML = `
    <div class="game-header">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px 4px;">
        <button class="back-btn" style="font-size:12px;padding:6px 10px;" onclick="quitGame()">✕ Lopeta</button>
        <div style="font-size:12px;color:var(--muted);">${gName} · ${coName}</div>
      </div>
      <div class="player-tabs">${tabs}</div>
    </div>
    <div class="score-board">
      <div class="cur-player-name">${esc(p.name)}</div>
      <div class="cur-score" id="cscore">${p.score}</div>
      <div class="score-sub">${subLabel}</div>
    </div>
    ${coHtml}
    <div class="darts-thrown">${chips}</div>
    <div class="input-area">
      <div class="modifier-row">
        <button class="mod-btn ${modT?'active-T':''}" onclick="toggleMod('T')">TRIPLE</button>
        <button class="mod-btn ${modD?'active-D':''}" onclick="toggleMod('D')">DOUBLE</button>
        <button class="mod-btn miss-btn" onclick="x01Miss()">HUTI</button>
        <button class="mod-btn undo-btn" onclick="x01Undo()" style="flex:1.2;">↩ TIKKA</button>
        <button class="mod-btn undo-btn" onclick="x01UndoTurn()" style="flex:1.3;font-size:15px;">↩ VUORO</button>
      </div>
      <div class="number-grid">${nums}</div>
    </div>
  `;
  return div;
}

function toggleMod(m) { S.game.modifier = S.game.modifier===m?null:m; render(); }

function x01Dart(num) {
  const g = S.game;
  if (g.currentDarts.length>=3||g.gameOver) return;
  const dart = (g.modifier||'') + num;
  g.modifier = null;
  processX01(dart);
}

function x01Bull() {
  const g = S.game;
  if (g.currentDarts.length>=3||g.gameOver) return;
  const dart = g.modifier==='D' ? 'BULL' : '25';
  g.modifier = null;
  processX01(dart);
}

function x01Miss() {
  const g = S.game;
  if (g.currentDarts.length>=3||g.gameOver) return;
  g.modifier = null;
  processX01('MISS');
}

function processX01(dart) {
  const g = S.game;
  const p = g.players[g.currentPlayerIndex];
  const val = dartValue(dart);
  const newScore = p.score - val;

  if (newScore < 0) {
    g.currentDarts.push(dart);
    showBust(() => {
      p.score = g.turnStartScore;
      p.history.push({ darts:[...g.currentDarts], bust:true });
      g.currentDarts = []; g.modifier = null;
      advanceX01();
    });
    return;
  }

  if (newScore === 0) {
    if (!validCheckout(dart, g.checkoutMode, p.score)) {
      g.currentDarts.push(dart);
      showBust(() => {
        p.score = g.turnStartScore;
        p.history.push({ darts:[...g.currentDarts], bust:true });
        g.currentDarts = []; g.modifier = null;
        advanceX01();
      });
      return;
    }
    g.currentDarts.push(dart);
    p.score = 0;
    g.gameOver = true; g.winner = p; g.endTime = Date.now();
    p.history.push({ darts:[...g.currentDarts] });
    endGame();
    return;
  }

  // Remaining = 1 with double/master out → impossible, immediate bust
  if (newScore === 1 && (g.checkoutMode === 'double' || g.checkoutMode === 'master')) {
    g.currentDarts.push(dart);
    showBust(() => {
      p.score = g.turnStartScore;
      p.history.push({ darts:[...g.currentDarts], bust:true });
      g.currentDarts = []; g.modifier = null;
      advanceX01();
    });
    return;
  }

  g.currentDarts.push(dart);
  p.score = newScore;
  if (g.currentDarts.length >= 3) setTimeout(()=>x01Next(),300);
  else { render(); animateScore(); }
}

// ==================== CHECKOUT FINDER ====================
(function buildCheckouts() {
  const all = [];
  for(let i=1;i<=20;i++){
    all.push({d:String(i),v:i});
    all.push({d:'D'+i,v:i*2,fin:true});
    all.push({d:'T'+i,v:i*3});
  }
  all.push({d:'25',v:25});
  all.push({d:'Bull',v:50,fin:true});
  const fins = all.filter(x=>x.fin);
  const _co = {};

  // 1 dart
  for(const f of fins) _co[f.v] = [f.d];

  // 2 darts
  for(const d1 of all){
    for(const f of fins){
      const tot = d1.v+f.v;
      if(tot>=2&&tot<=170&&!_co[tot]) _co[tot]=[d1.d,f.d];
    }
  }

  // 3 darts – prefer highest first dart
  const sorted = [...all].sort((a,b)=>b.v-a.v);
  for(const d1 of sorted){
    for(const d2 of all){
      for(const f of fins){
        const tot=d1.v+d2.v+f.v;
        if(tot>=2&&tot<=170&&!_co[tot]) _co[tot]=[d1.d,d2.d,f.d];
      }
    }
  }
  window._checkouts = _co;
})();

function getCheckout(remaining, mode, dartsLeft) {
  if(!remaining||remaining<2||remaining>170) return null;
  if(mode==='any'||mode==='single') return null;
  const co = window._checkouts?.[remaining];
  if(!co) return null;
  // Only show if achievable with darts left
  if(co.length > dartsLeft) return null;
  return co;
}

function x01Undo() {
  const g = S.game;
  if (!g.currentDarts.length) return;
  g.currentDarts.pop();
  const p = g.players[g.currentPlayerIndex];
  p.score = g.turnStartScore - g.currentDarts.reduce((s,d)=>s+dartValue(d),0);
  g.modifier = null;
  render();
}

function x01UndoTurn() {
  const g=S.game; const p=g.players[g.currentPlayerIndex];
  if(g.currentDarts.length>0){g.currentDarts=[];p.score=g.turnStartScore;g.modifier=null;render();return;}
  const pi=(g.currentPlayerIndex-1+g.players.length)%g.players.length;
  const prev=g.players[pi];
  if(!prev.history||!prev.history.length){showToast('Ei peruutettavaa','error');return;}
  const last=prev.history.pop();
  if(!last.bust)prev.score=(prev.score||0)+(last.scored||0);
  g.currentPlayerIndex=pi;g.turnStartScore=prev.score;g.currentDarts=[];g.modifier=null;render();
}

function x01Next() {

}

function cricketDartBtn(el) {
  const raw = el.getAttribute('data-num');

function cricketDart(num) {
  const g = S.game;
  if (g.currentDarts.length>=3||g.gameOver) return;
  const mod = g.modifier||''; g.modifier = null;
  let dart, hits;
  if (num==='BULL') { dart=mod==='D'?'BULL':mod==='T'?'T25':'25'; hits=mod==='D'?2:mod==='T'?3:1; }
  else { dart=mod+num; hits=mod==='T'?3:mod==='D'?2:1; }
  g.currentDarts.push(dart);

  const p = g.players[g.currentPlayerIndex];
  const tgt = num==='BULL'?'BULL':num;
  if (CRICKET_NUMS.includes(tgt)) {
    const prev = p.marks[tgt];
    const close = Math.min(hits, Math.max(0, 3-prev));
    const extra = hits - close;
    p.marks[tgt] = Math.min(3, prev+hits);
    if (g.cricketMode==='american' && extra>0) {
      const othersOpen = g.players.some(pl=>pl!==p && pl.marks[tgt]<3);
      if (othersOpen) {
        const pts = tgt==='BULL' ? 25*extra : tgt*extra;
        p.points += pts;
        p.cPts[tgt] = (p.cPts[tgt]||0)+pts;
      }
    }
    if (checkCricketWin(p)) { g.gameOver=true; g.winner=p; g.endTime=Date.now(); endGame(); return; }
  }
  if (g.currentDarts.length>=3) setTimeout(()=>cricketNext(),400);
  else render();
}

function checkCricketWin(p) {
  const g = S.game;
  if (!CRICKET_NUMS.every(n=>p.marks[n]>=3)) return false;
  if (g.cricketMode==='standard') return true;
  const maxOther = Math.max(...g.players.filter(pl=>pl!==p).map(pl=>pl.points));
  return p.points >= maxOther;
}

function cricketMiss() {
  const g = S.game;
  if (g.currentDarts.length>=3) return;
  g.modifier=null; g.currentDarts.push('MISS');
  if (g.currentDarts.length>=3) setTimeout(()=>cricketNext(),400); else render();
}

function cricketUndo() {
  const g = S.game;
  if (!g.currentDarts.length) return;
  const last = g.currentDarts.pop();
  const p = g.players[g.currentPlayerIndex];
  if (last && last!=='MISS') {
    const mod = last.startsWith('T')?3:last.startsWith('D')?2:1;
    const numStr = last.replace(/^[TDB]/,'');
    const n = numStr==='25'||last==='BULL'?'BULL':parseInt(numStr);
    if (CRICKET_NUMS.includes(n)) p.marks[n]=Math.max(0,p.marks[n]-mod);
  }
  g.modifier=null; render();
}

function cricketNext() {
  const g = S.game;

  g.currentDarts=[]; g.modifier=null;
  g.currentPlayerIndex = (g.currentPlayerIndex+1)%g.players.length;
  render();
}

  const tgt=g.targets[g.roundIndex]; const darts=g.currentDarts;
  const div=el('div','screen'); div.style.cssText='display:flex;flex-direction:column;height:100%;overflow:hidden;';

  const pRows=g.players.map((pl,i)=>`
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid ${i===g.currentPlayerIndex?'var(--accent)':'var(--border)'};border-radius:10px;padding:11px 14px;margin-bottom:5px;">
      <div style="font-size:13px;color:${i===g.currentPlayerIndex?'var(--accent)':'var(--text)'};">${i===g.currentPlayerIndex?'▶ ':''}${esc(pl.name)}</div>
      <div style="font-family:var(--fd);font-size:28px;">${pl.score}</div>
    </div>`).join('');

  const chips=[0,1,2].map(i=>{const d=darts[i];return`<div class="dart-chip ${d?dartClass(d):'empty'}">${d||'—'}</div>`;}).join('');
  let nums='';
  for(let n=1;n<=20;n++)nums+=`<button class="num-btn" onclick="halveitDart(${n})">${n}</button>`;
  nums+=`<button class="num-btn bull-btn" onclick="halveitDart('BULL')">BULL<br><small style="font-family:var(--fu);font-size:10px;">25/50</small></button>`;
  nums+=`<button class="num-btn next-btn" onclick="halveitNext()">SEURAAVA ›</button>`;
  const modT=g.modifier==='T', modD=g.modifier==='D';
  const remRounds=g.targets.length-g.roundIndex-1;

  div.innerHTML = `
    <div class="game-header">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 12px 4px;">
        <button class="back-btn" style="font-size:12px;padding:5px 9px;" onclick="quitGame()">✕ Lopeta</button>
        <div style="font-size:12px;color:var(--muted);">HALVE-IT · Kierros ${g.roundIndex+1}/${g.targets.length}</div>
      </div>
    </div>
    <div style="padding:10px 16px;text-align:center;flex-shrink:0;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:2px;">TAVOITE</div>
      <div style="font-family:var(--fd);font-size:64px;color:var(--accent);line-height:1;">${tgt}</div>
      <div style="font-size:11px;color:var(--red);margin-top:3px;">Huti → pisteet puolittuvat!</div>
      ${remRounds>0?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">Seuraavat: ${g.targets.slice(g.roundIndex+1).join(' · ')}</div>`:''}
    </div>
    <div style="flex:1;overflow-y:auto;padding:0 10px;">${pRows}</div>
    <div style="padding:8px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;">
      <div class="darts-thrown" style="padding:3px 0 7px;">${chips}</div>
      <div class="modifier-row" style="margin-bottom:7px;">
        <button class="mod-btn ${modT?'active-T':''}" onclick="toggleMod('T')">TRIPLE</button>
        <button class="mod-btn ${modD?'active-D':''}" onclick="toggleMod('D')">DOUBLE</button>
        <button class="mod-btn miss-btn" onclick="halveitMiss()">HUTI</button>
        <button class="mod-btn undo-btn" onclick="halveitUndo()">↩</button>
      </div>
      <div class="number-grid">${nums}</div>
    </div>
  `;
  return div;
}

function halveitScore(dart, tgt) {
  const mod=dart.startsWith('T')?3:dart.startsWith('D')?2:1;
  const numStr=dart.replace(/^[TDB]/,'');
  const num=parseInt(numStr);
  if(tgt==='D-BULL'&&dart==='BULL') return 50;
  if(tgt==='BULL'&&dart==='25') return 25;
  if(typeof tgt==='string'&&tgt.startsWith('D')&&dart.startsWith('D')&&parseInt(tgt.slice(1))===num) return num*2;
  if(typeof tgt==='string'&&tgt.startsWith('T')&&dart.startsWith('T')&&parseInt(tgt.slice(1))===num) return num*3;
  if(typeof tgt==='number'&&!dart.startsWith('T')&&!dart.startsWith('D')&&num===tgt) return tgt;
  return 0;
}

function halveitDart(num){
  const g=S.game;if(g.currentDarts.length>=3||g.gameOver)return;
  const mod=g.modifier||'';g.modifier=null;
  const dart=num==='BULL'?(mod==='D'?'BULL':mod==='T'?'T25':'25'):mod+num;
  g.currentDarts.push(dart);
  const p=g.players[g.currentPlayerIndex];
  const sc=halveitScore(dart,g.targets[g.roundIndex]);
  p.turnPts=(p.turnPts||0)+sc;
  if(g.currentDarts.length>=3)setTimeout(()=>halveitNext(),400);else render();
}
function halveitMiss(){const g=S.game;if(g.currentDarts.length>=3)return;g.modifier=null;g.currentDarts.push('MISS');if(g.currentDarts.length>=3)setTimeout(()=>halveitNext(),400);else render();}
function halveitUndo(){const g=S.game;if(!g.currentDarts.length)return;const last=g.currentDarts.pop();const p=g.players[g.currentPlayerIndex];p.turnPts=Math.max(0,(p.turnPts||0)-halveitScore(last,g.targets[g.roundIndex]));g.modifier=null;render();}
function halveitNext(){
  const g=S.game;const p=g.players[g.currentPlayerIndex];
  const sc=p.turnPts||0;
  if(sc===0){p.score=Math.floor(p.score/2);showToast(`${p.name}: Huti! Puolittui → ${p.score}`,'error');}
  else{p.score+=sc;}
  p.turnPts=0;
  p.history.push({darts:[...g.currentDarts],scored:sc});
  g.currentDarts=[];g.modifier=null;
  const nxt=(g.currentPlayerIndex+1)%g.players.length;
  if(nxt===0){
    if(g.roundIndex>=g.targets.length-1){const mx=Math.max(...g.players.map(pl=>pl.score));const w=g.players.find(pl=>pl.score===mx);g.gameOver=true;g.winner=w;g.endTime=Date.now();endGame();return;}
    g.roundIndex++;
  }
  g.currentPlayerIndex=nxt;render();
}

// ==================== GAME OVER ====================
function endGame() {
  const g=S.game;
  const dur=g.endTime?Math.round((g.endTime-g.startTime)/1000):0;
  fbSaveGame({
    type:g.type,
    winner:g.winner?{id:g.winner.id,name:g.winner.name}:null,
    players:g.players.map(p=>({id:p.id,name:p.name})),
    checkoutMode:g.checkoutMode||null,
    cricketMode:g.cricketMode||null,
    startScore:g.startScore||null,
    duration:dur,
  });
  if(g.winner){const w=S.players.find(p=>p.id===g.winner.id);if(w){w.wins=(w.wins||0)+1;}}
  g.players.forEach(gp=>{const p=S.players.find(p=>p.id===gp.id);if(p){p.games=(p.games||0)+1;fbUpdatePlayerStats(p.id,p.wins,p.games);}});
  localStorage.removeItem('darts_game');
  nav('gameover');
  setTimeout(launchConfetti,300);
}

function calcTurnStats(g) {
  if(!['501','301','701','custom_x01'].includes(g?.type)) return null;
  return g.players.map(p=>{
    const turns=(p.history||[]).filter(h=>!h.bust&&h.scored>0);
    const sc=turns.map(h=>h.scored);
    const avg=sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):0;
    const best=sc.length?Math.max(...sc):0;
    const busts=(p.history||[]).filter(h=>h.bust).length;
    return {name:p.name,id:p.id,avg,best,busts,turns:p.history?.length||0};
  });
}

function renderGameOver() {
  const g=S.game; const w=g?.winner;
  const gName=GAMES.find(t=>t.id===g?.type)?.name||g?.type||'?';
  const dur=g?.endTime?fmtDuration(Math.round((g.endTime-g.startTime)/1000)):'';
  const ts=calcTurnStats(g);
  const isX01=['501','301','701','custom_x01'].includes(g?.type);
  const statsHtml=ts?ts.map(s=>'<div class="gstat-box"><div class="gstat-title">'+esc(s.name).toUpperCase()+'</div>'
    +'<div class="gstat-row"><span>Keskiarvo / vuoro</span><span class="gstat-val">'+s.avg+' pts</span></div>'
    +'<div class="gstat-row"><span>Paras vuoro</span><span class="gstat-val">'+s.best+' pts</span></div>'
    +'<div class="gstat-row"><span>Bustit</span><span class="gstat-val">'+s.busts+'</span></div>'
    +'<div class="gstat-row"><span>Vuoroja</span><span class="gstat-val">'+s.turns+'</span></div>'
    +'</div>').join(''):'';
  const div=el('div','screen');
  const playerRows=g?.players?g.players.map(p=>'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:14px;"><span style="color:'+(p.id===w?.id?'var(--gold)':'var(--text)')+';">'+(p.id===w?.id?'&#127942; ':'')+esc(p.name)+'</span>'+(isX01?'<span style="color:var(--muted);">'+p.score+' jäljellä</span>':'')+'</div>').join(''):'';
  div.innerHTML='<div class="gameover-screen" style="overflow-y:auto;justify-content:flex-start;padding-top:28px;">'
    +'<div style="font-size:80px;margin-bottom:10px;">&#127942;</div>'
    +'<div class="winner-label">Voittaja</div>'
    +'<div class="winner-name">'+esc(w?.name||'?')+'</div>'
    +'<div style="margin-top:8px;font-size:13px;color:var(--muted);">'+gName+(dur?' &middot; '+dur:'')+'</div>'
    +(ts?'<div style="width:100%;max-width:340px;margin-top:14px;">'+statsHtml+'</div>':'')
    +(g?.players?'<div style="margin-top:12px;width:100%;max-width:300px;">'+playerRows+'</div>':'')
    +'<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px;padding:0 16px 24px;">'
    +'<button class="btn large" onclick="startNew()">&#127919; Uusi peli</button>'
    +'<button class="btn large secondary" onclick="nav(&quot;home&quot;)">&#127968; Etusivu</button>'
    +'</div></div>';
  return div;
}
function quitGame() { if(confirm('Lopeta peli kesken?')){ localStorage.removeItem('darts_game'); S.game=null; nav('home'); } }

// ==================== STATS ====================
async function goStats() {
  nav('stats');
  initFirebase();
  const h=await fbLoadHistory();
  const st={};
  h.forEach(g=>{
    if(!g.players)return;
    g.players.forEach(p=>{
      if(!st[p.id])st[p.id]={name:p.name,games:0,wins:0,types:{}};
      st[p.id].games++;
      st[p.id].types[g.type]=(st[p.id].types[g.type]||0)+1;
    });
    if(g.winner){
      if(!st[g.winner.id])st[g.winner.id]={name:g.winner.name,games:0,wins:0,types:{}};
      st[g.winner.id].wins++;
    }
  });
  S.stats=st; S.statsLoaded=true;
  render();
}

function renderStats() {
  const div=el('div','screen');
  let content;
  if(!S.statsLoaded){content=`<div class="loader">⏳ Ladataan...</div>`;}
  else if(!Object.keys(S.stats).length){content=`<div class="empty-state"><span class="ei">📊</span><p>Ei tilastoja vielä.</p></div>`;}
  else{
    const sorted=Object.values(S.stats).sort((a,b)=>b.wins-a.wins);
    const maxG=Math.max(1,...sorted.map(s=>s.games));
    const mkBar=(items,val,col,sfx)=>'<div class="bar-container">'+items.map(s=>{const pct=Math.round(val(s)/Math.max(1,...items.map(val))*100);return '<div class="bar-row"><div class="bar-label">'+esc(s.name)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(typeof col==='function'?col(s):col)+';">'+sfx(s)+'</div></div></div>';}).join('')+'</div>';
    const barWin='<div class="stat-card" style="margin-bottom:12px;"><div class="stat-name">Voitto%</div>'+mkBar(sorted,s=>s.games>0?Math.round(s.wins/s.games*100):0,s=>{const p=s.games>0?Math.round(s.wins/s.games*100):0;return p>=60?'var(--accent)':p>=35?'var(--gold)':'var(--muted)';},s=>(s.games>0?Math.round(s.wins/s.games*100):0)+'%')+'</div>';
    const barG='<div class="stat-card" style="margin-bottom:12px;"><div class="stat-name">Pelejä pelattu</div>'+mkBar(sorted,s=>s.games,'var(--blue)',s=>s.games)+'</div>';
    const cards=sorted.map(s=>`
      <div class="stat-card">
        <div class="stat-name">${esc(s.name)}</div>
        <div class="stat-row"><span>Pelattu</span><span class="stat-val">${s.games}</span></div>
        <div class="stat-row"><span>Voitot</span><span class="stat-val">${s.wins}</span></div>
        <div class="stat-row"><span>Voitto%</span><span class="stat-val">${s.games>0?Math.round(s.wins/s.games*100):0}%</span></div>
        <div class="stat-row"><span>Suosikkipeli</span><span class="stat-val">${Object.entries(s.types).sort((a,b)=>b[1]-a[1])[0]?.[0]||'–'}</span></div>
      </div>`).join('');
    content=`<div class="stats-grid">${barWin}${barG}${cards}</div>`;
  }
  div.innerHTML=`
    <div class="header">
      <button class="back-btn" onclick="nav('home')">‹ Takaisin</button>
      <div class="header-title">Tilastot</div>
    </div>
    ${content}
  `;
  return div;
}

// ==================== HELPERS ====================
function animateScore() {
  requestAnimationFrame(() => { const sc=document.getElementById('cscore'); if(!sc)return; sc.classList.remove('score-drop'); void sc.offsetWidth; sc.classList.add('score-drop'); });
}
function launchConfetti() {
  const cols=['#00e87a','#ffd700','#ff3355','#4488ff','#fff','#ff9900'];
  for(let i=0;i<80;i++){const p=document.createElement('div');p.className='confetti-piece';const sz=6+Math.random()*10;p.style.cssText='left:'+Math.random()*100+'vw;width:'+sz+'px;height:'+sz+'px;background:'+cols[Math.floor(Math.random()*cols.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-duration:'+(1.5+Math.random()*2)+'s;animation-delay:'+(Math.random()*.8)+'s;';document.body.appendChild(p);p.addEventListener('animationend',()=>p.remove());}
}
function el(tag,cls){ const d=document.createElement(tag); if(cls)d.className=cls; return d; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  try {

      S.screen = 'game';
    }
  } catch(e) { localStorage.removeItem('darts_game'); }
  // Load players from Firebase
  await loadPlayers();
  render();
}
window.addEventListener("load", init);

<script>
// Swipe right = go back
(function() {
  let sx = 0, sy = 0;
  document.addEventListener('touchstart', e => {
    sx = e.changedTouches[0].screenX;
    sy = e.changedTouches[0].screenY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].screenX - sx;
    const dy = Math.abs(e.changedTouches[0].screenY - sy);
    if (dx > 80 && dy < 60) {
      const backMap = {
        players: 'home', 'setup-type': 'home', 'setup-config': 'setup-type',
        'setup-players': 'setup-config', history: 'home', stats: 'home',
        gameover: 'home'
      };
      const target = backMap[S.screen];
      if (target) nav(target);
    }
  }, { passive: true });
})();
